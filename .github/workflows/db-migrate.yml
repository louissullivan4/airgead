name: DB Migrate

on:
  workflow_call:
    inputs:
      stage:
        description: 'Deployment stage: test or production'
        required: true
        type: string

permissions:
  contents: read

jobs:
  migrate:
    name: Migrate ${{ inputs.stage }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v6
        id: root-cache
        with:
          path: node_modules
          key: root-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.root-cache.outputs.cache-hit != 'true'
        run: npm ci
      # Secrets are referenced literally (never via a computed key) so the job
      # receives only the two DB URLs, not the whole secrets context.
      - run: |
          case "$STAGE" in
            test)       DB_URL=$TEST_DB_URL ;;
            production) DB_URL=$PROD_DB_URL ;;
            *) echo "Unknown stage: $STAGE" >&2; exit 1 ;;
          esac
          [ -n "$DB_URL" ] || { echo "No database URL secret set for stage $STAGE" >&2; exit 1; }
          export DB_URL
          npm run migrate:up --workspace=backend
        env:
          STAGE: ${{ inputs.stage }}
          TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
