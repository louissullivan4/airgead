name: CI / CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

# Cancel in-progress runs for PRs (new push supersedes); never cancel a main deploy mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── CI checks run in parallel ─────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        id: root-cache
        with:
          path: node_modules
          key: root-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.root-cache.outputs.cache-hit != 'true'
        run: npm ci
      # Runs eslint (backend) + next lint (frontend) across both workspaces.
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        id: root-cache
        with:
          path: node_modules
          key: root-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.root-cache.outputs.cache-hit != 'true'
        run: npm ci
      # Backend jest suite.
      - run: npm test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/cache@v4
        id: frontend-cache
        with:
          path: frontend/node_modules
          key: frontend-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - if: steps.frontend-cache.outputs.cache-hit != 'true'
        run: cd frontend && npm ci
      - run: cd frontend && npm run build

  # ── Build & push images (main only) ───────────────────────────────────────

  docker-backend:
    name: Docker — Backend
    if: github.event_name == 'push'
    needs: [lint, test, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  docker-frontend:
    name: Docker — Frontend
    if: github.event_name == 'push'
    needs: [lint, test, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Run DB migrations, then redeploy on Railway ───────────────────────────

  migrate:
    name: Run Migrations
    if: github.event_name == 'push'
    needs: [docker-backend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        id: root-cache
        with:
          path: node_modules
          key: root-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.root-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run migrate --workspace=backend
        env:
          DB_URL: ${{ secrets.DB_URL }}

  deploy:
    name: Deploy to Railway
    if: github.event_name == 'push'
    needs: [docker-backend, docker-frontend, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Each Railway service must be set to pull its GHCR image (…/backend:latest,
      # …/frontend:latest). This step just tells Railway to redeploy that image.
      - name: Trigger backend redeploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_BACKEND_DEPLOY_HOOK }}"
      - name: Trigger frontend redeploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_FRONTEND_DEPLOY_HOOK }}"
