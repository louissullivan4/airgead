version: 2
updates:
  # Minor/patch bumps arrive as one grouped PR per directory; majors come individually.
  - package-ecosystem: npm
    directories:
      - '/'
      - '/backend'
      - '/frontend'
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
